ai_usage_summary: |
  Used Gemini as an agentic pair-programming assistant to implement the ranking logic, memory-efficient streaming pipeline, and robust honeypot filtering checks.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  High-performance rule-based candidate ranker tailored for the Senior AI Engineer role. Implements a multi-layered scoring pipeline combining title matching (40%), years of experience trapezoidal alignment (20%), product vs service company experience (15%), skills depth and trust factors (15%), and location/relocation preferences (10%). Incorporates a multiplicative behavioral signal modifier (response rate, log-in activity, notice period, and open-to-work status). Features a strict anomaly filter to completely screen out honeypots (identifying zero-duration skill stuffers and career timeline contradictions). Streamlined to process 100K candidates line-by-line in under 15 seconds with minimal memory footprint on a single CPU.

